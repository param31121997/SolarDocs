<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #333; padding: 6px; text-align: left; }
    .header-row td { border: none; padding: 2px 6px; }
    .total-row td { font-weight: bold; }
    h1 { text-align: center; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Quotation</h1>
  <table>
    <tr class="header-row"><td><b>Bill No:</b></td><td th:text="${billNo}"></td><td><b>Date:</b></td><td th:text="${date}"></td></tr>
    <tr class="header-row"><td><b>Name:</b></td><td colspan="3" th:text="${customerName}"></td></tr>
    <tr class="header-row"><td><b>Address:</b></td><td colspan="3" th:text="${address.addressLine} + ', ' + ${address.village} + ' ' + ${address.pincode}"></td></tr>
    <tr class="header-row"><td><b>Contact No.:</b></td><td colspan="3" th:text="${mobile}"></td></tr>
    <tr class="header-row"><td><b>State:</b></td><td colspan="3" th:text="${state}"></td></tr>
  </table>

  <table>
    <thead>
      <tr><th>#</th><th>Items</th><th>Type</th><th>Qnty</th><th>Unit</th><th>Rate</th><th>GST</th><th>Amount</th></tr>
    </thead>
    <tbody>
      <tr th:each="line : ${lineItems}">
        <td th:text="${line.slNo}"></td>
        <td th:text="${line.item}"></td>
        <td th:text="${line.type}"></td>
        <td th:text="${line.qty}"></td>
        <td th:text="${line.unit}"></td>
        <td th:text="${line.rate}"></td>
        <td th:text="${line.gstPercent}"></td>
        <td th:text="${line.amount}"></td>
      </tr>
      <tr class="total-row">
        <td colspan="7">Total</td>
        <td th:text="${total}"></td>
      </tr>
    </tbody>
  </table>

  <table>
    <tr><td><b>Amount in words:</b></td><td th:text="${amountInWords}"></td></tr>
    <tr><td><b>Bank Details:</b></td>
        <td>
          <span th:text="'Account Name: ' + ${bankDetails.get('accountName')}"></span><br/>
          <span th:text="'Account Number: ' + ${bankDetails.get('accountNumber')}"></span><br/>
          <span th:text="'IFSC: ' + ${bankDetails.get('ifsc')}"></span>
        </td>
    </tr>
  </table>
</body>
</html>
