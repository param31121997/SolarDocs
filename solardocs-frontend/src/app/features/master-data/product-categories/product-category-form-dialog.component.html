<h2 mat-dialog-title>
  {{ (isEditMode ? 'productCategory.editTitle' : 'productCategory.addTitle') | translate }}
</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'productCategory.categoryName' | translate }}</mat-label>
      <input matInput formControlName="categoryName" maxlength="100" required>
      <mat-error *ngIf="form.controls.categoryName.hasError('required')">
        {{ 'productCategory.nameRequired' | translate }}
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'productCategory.description' | translate }}</mat-label>
      <textarea matInput formControlName="description" rows="3" maxlength="500"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button mat-raised-button color="primary" type="submit">
      {{ (isEditMode ? 'common.update' : 'common.create') | translate }}
    </button>
  </mat-dialog-actions>
</form>
