<h2 mat-dialog-title>
  {{ (isEditMode ? 'item.editTitle' : 'item.addTitle') | translate }}
</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'item.itemName' | translate }}</mat-label>
      <input matInput formControlName="itemName" maxlength="150" required>
      <mat-error *ngIf="form.controls.itemName.hasError('required')">
        {{ 'item.nameRequired' | translate }}
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'item.description' | translate }}</mat-label>
      <textarea matInput formControlName="description" rows="3" maxlength="500"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
    <button mat-raised-button color="primary" type="submit">
      {{ (isEditMode ? 'common.update' : 'common.create') | translate }}
    </button>
  </mat-dialog-actions>
</form>
