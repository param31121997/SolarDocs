<h2 mat-dialog-title>{{ data.titleKey | translate }}</h2>
<mat-dialog-content>
  <p>{{ data.messageKey | translate:data.messageParams }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ (data.cancelKey ?? 'common.cancel') | translate }}</button>
  <button mat-raised-button color="warn" (click)="confirm()">{{ (data.confirmKey ?? 'common.delete') | translate }}</button>
</mat-dialog-actions>
