<app-first-run-wizard *ngIf="needsSetup() === true" (saved)="onDataDirectorySaved()"></app-first-run-wizard>

<mat-toolbar color="primary" class="app-toolbar">
  <span class="app-title">{{ 'app.title' | translate }}</span>
  <span class="spacer"></span>
  <app-language-switcher></app-language-switcher>
</mat-toolbar>

<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>{{ 'nav.dashboard' | translate }}</span>
      </a>
      <a mat-list-item routerLink="/customers" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>{{ 'nav.customers' | translate }}</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive="active-link">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>{{ 'nav.settings' | translate }}</span>
      </a>
      <a mat-list-item routerLink="/backup" routerLinkActive="active-link">
        <mat-icon matListItemIcon>backup</mat-icon>
        <span matListItemTitle>{{ 'nav.backup' | translate }}</span>
      </a>
      <a mat-list-item routerLink="/license" routerLinkActive="active-link">
        <mat-icon matListItemIcon>vpn_key</mat-icon>
        <span matListItemTitle>{{ 'nav.license' | translate }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
